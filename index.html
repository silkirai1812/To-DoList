<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="navbar">
        <div class="nav-container">
            <div class="logo">✔ ToDo</div>
            <div class="theme-option">
                <div class="light-theme theme-selector"></div>
                <div class="dark-theme theme-selector"></div>
            </div>
        </div>
    </div>
    <h1 id="title">To-Do List<div id="border"></div>
    </h1>
    <div class="container"> 
        
        <select id="category">
            <option value="">Select Category </option>
            <option value="Personal">Personal</option>
            <option value="Books to read">Books to read</option>
            <option value="To Buy">To Buy</option>
            <option value="None">No Category</option>
        </select>
        <input type="text" id="input" placeholder="Enter a new task">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="task-list">
    </ul>
</body>

</html>
